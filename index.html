<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); min-height: 100vh; padding: 20px; }
    .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
  </style>
</head>
<body>

  <div class="max-w-md mx-auto glass p-8 rounded-3xl shadow-2xl">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-blue-900">UPTD FARMASI</h1>
      <p class="text-xs font-semibold text-blue-600 uppercase">Kota Tangerang Selatan</p>
      <p class="italic mt-3 text-gray-600 text-sm">"Melayani dengan sepenuh hati, ramah, sopan santun, dan cepat."</p>
    </div>

    <!-- Form & Konten -->
    <div class="space-y-6">
      <!-- Link Survei -->
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSexxMw_FdW-XT6yTyiPUVnpFyKf_j01-4lk-JmiQRrT3IC04A/viewform" 
         target="_blank" class="block w-full bg-green-600 text-white text-center p-3 rounded-xl font-bold shadow-lg">
        Isi Survei Kepuasan
      </a>

      <!-- Input Data -->
      <div class="space-y-3">
        <input id="nama" placeholder="Nama Lengkap" class="w-full p-3 border rounded-xl">
        <select id="keperluan" class="w-full p-3 border rounded-xl">
          <option value="">Pilih Keperluan</option>
          <option value="OBAT_PKD">A. OBAT PKD</option>
          <option value="VAKSIN">B. VAKSIN</option>
        </select>
        <button class="w-full bg-blue-900 text-white p-4 rounded-xl font-bold">Check-In</button>
      </div>

      <!-- Menu Edukasi -->
      <div class="border-t pt-6">
        <h3 class="font-bold text-blue-900 mb-3">Pojok Edukasi</h3>
        <div class="bg-blue-50 p-4 rounded-xl border-l-4 border-blue-500">
          <h4 class="font-bold text-sm">Cara Penyimpanan Obat</h4>
          <p class="text-xs text-gray-600 mt-1">Simpan di tempat sejuk dan kering...</p>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
