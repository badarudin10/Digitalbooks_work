<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
    .hidden { opacity: 0; visibility: hidden; }
    .visible { opacity: 1; visibility: visible; }
  </style>
  <title>Buku Tamu - UPTD Farmasi Tangsel</title>
</head>
<body class="bg-slate-50 font-sans p-4 md:p-8">

 <!-- Judul Utama dengan Logo -->
<div class="flex items-center justify-center gap-4 mb-2">
  <img src="https://i.ibb.co.com/7dqQCb1y/Lambang-Kota-Tangerang-Selatan.jpg" alt="Logo" class="h-16 w-16 object-contain">
  <div class="text-center">
    <h1 class="text-3xl font-bold text-blue-900">UPTD FARMASI</h1>
    <h2 class="text-sm text-gray-600 uppercase">Kota Tangerang Selatan</h2>
  </div>
</div>
<p class="italic text-center text-sm text-gray-500 mb-6">"Kami melayani dengan sepenuh hati, sesuai dengan standar, ramah, sopan santun, serta melakukan yang terbaik."</p>
    <!-- Grid Layout: Registrasi (Kiri), Menu (Kanan) -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      
      <!-- Kolom Kiri: Registrasi Tamu -->
      <div class="space-y-4">
        <h3 class="font-bold text-gray-700">Registrasi Tamu</h3>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="nama" placeholder="Nama Lengkap" class="w-full p-3 border rounded-lg">
          <input id="instansi" placeholder="Instansi" class="w-full p-3 border rounded-lg">
        </div>
        <input id="hp" placeholder="No. Telepon (Contoh: 08123456789)" class="w-full p-3 border rounded-lg">
        
        <select id="keperluan" class="w-full p-3 border rounded-lg">
          <option value="">Pilih Keperluan:</option>
          <option value="OBAT_PKD">A. OBAT PKD</option>
          <option value="VAKSIN">B. VAKSIN</option>
          <option value="REAGEN">C. REAGEN</option>
          <option value="TB_KUSTA">D. TB dan KUSTA</option>
          <option value="HIV_JIWA">E. HIV dan JIWA</option>
          <option value="DBD_MALARIA">F. DBD dan MALARIA</option>
          <option value="KECACINGAN">G. KECACINGAN</option>
          <option value="HEPATITIS">H. HEPATITIS</option>
          <option value="GIZI">I. GIZI</option>
        </select>
        
        <button id="btnSubmit" class="w-full bg-blue-900 text-white p-4 rounded-lg font-bold hover:bg-blue-800 transition">
          Check-In & Ambil Antrian
        </button>
      </div>

      <!-- Kolom Kanan: Tombol Menu -->
      <div class="flex flex-col gap-4 border-t pt-6 lg:pt-0 lg:border-t-0">
        <div class="grid grid-cols-1 gap-3">
          <a href="konten.html" class="bg-blue-900 text-white p-4 rounded-xl text-center font-bold shadow-lg hover:bg-blue-800 transition">
            Buka Menu Informasi & Layanan
          </a>
        </div> 

        <a href="https://docs.google.com/forms/d/e/1FAIpQLSexxMw_FdW-XT6yTyiPUVnpFyKf_j01-4lk-JmiQRrT3IC04A/viewform" target="_blank"
            class="block w-full bg-green-600 text-white text-center p-4 rounded-xl font-bold hover:bg-green-700 transition">
          Isi Survei Kepuasan Dulu
        </a>
      </div>
    </div>

    <div class="mt-8 border-t pt-6">
      <h3 class="font-bold text-gray-700 mb-4">Galeri Kegiatan</h3>
      <div id="galeriPublik" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3"></div>
    </div>
  </div>

  <!-- Modal & Script tetap sama seperti sebelumnya -->
  <div id="modalAntrian" class="hidden fade-modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-40">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
      <h2 class="text-xl font-bold text-gray-800">Check-In Berhasil!</h2>
      <div id="nomorAntrianDisplay" class="text-5xl font-black text-blue-900 my-6">A-000</div>
      <button id="btnLanjutWA" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">Tutup & Lanjut ke WA</button>
    </div>
  </div>

  <div id="modalGambar" class="hidden fade-modal fixed inset-0 bg-black bg-opacity-95 z-50 flex items-center justify-center p-4">
    <button onclick="document.getElementById('modalGambar').className = 'hidden fade-modal fixed inset-0 bg-black bg-opacity-95 z-50 flex items-center justify-center p-4'" 
            class="absolute top-5 right-5 text-white text-5xl font-bold z-50 hover:text-red-500">&times;</button>
    <img id="gambarBesar" src="" class="max-w-full max-h-[90vh] rounded-lg shadow-2xl">
  </div>

  <script type="module">
    // [Skrip tetap sama persis seperti kode yang Anda kirimkan sebelumnya]
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, getDocs, onSnapshot, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", authDomain: "digital-books-d22c9.firebaseapp.com", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app", messagingSenderId: "905407530155", appId: "1:905407530155:web:dd90e18d4158ce42fae3ee", measurementId: "G-LL7GF2RMF8" };
    const db = getFirestore(initializeApp(firebaseConfig));

    onSnapshot(query(collection(db, "galeri"), orderBy("waktuInput", "desc")), (snapshot) => {
      const galeriContainer = document.getElementById("galeriPublik");
      galeriContainer.innerHTML = "";
      snapshot.forEach((doc) => {
        const url = doc.data().url;
        galeriContainer.innerHTML += `
          <div class="aspect-square overflow-hidden rounded-lg cursor-pointer hover:opacity-90 transition">
             <img src="${url}" onclick="bukaZoom('${url}')" class="w-full h-full object-cover">
          </div>
        `;
      });
    });

    window.bukaZoom = (url) => {
      document.getElementById("gambarBesar").src = url;
      document.getElementById("modalGambar").className = "visible fade-modal fixed inset-0 bg-black bg-opacity-95 z-50 flex items-center justify-center p-4";
    };

    document.getElementById("btnSubmit").addEventListener("click", async () => {
      const nama = document.getElementById("nama").value;
      const instansi = document.getElementById("instansi").value;
      const hp = document.getElementById("hp").value;
      const keperluan = document.getElementById("keperluan").value;
      if (!nama || !keperluan || !hp) return alert("Mohon isi Nama, No. HP, dan Keperluan!");
      
      const snap = await getDocs(collection(db, "tamu"));
      const kode = keperluan.substring(0, 1) + "-" + (snap.size + 1).toString().padStart(3, '0');
      
      await addDoc(collection(db, "tamu"), { nama, instansi, hp, keperluan, nomorAntrian: kode, waktu: serverTimestamp(), status: "menunggu" });
      
      document.getElementById("nomorAntrianDisplay").innerText = kode;
      document.getElementById("modalAntrian").className = "visible fade-modal fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-40";

      document.getElementById("btnLanjutWA").onclick = () => {
        const formatHP = hp.startsWith('0') ? '62' + hp.substring(1) : hp;
        const pesan = `Halo Admin, Saya Ingin Check-in.%0ANama: ${nama}%0AInstansi: ${instansi}%0AKeperluan: ${keperluan}%0ANomor Antrian: ${kode}`;
        window.open(`https://wa.me/62881080698977?text=${pesan}`, '_blank');
        location.reload();
      };
    });
  </script>
</body>
</html>
