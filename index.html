<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Latar belakang estetik dengan pola diagonal halus */
    body {
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }
    /* Pola segitiga halus di latar belakang */
    .pattern-bg {
      background-image: linear-gradient(45deg, #ffffff10 25%, transparent 25%, transparent 75%, #ffffff10 75%, #ffffff10), 
                        linear-gradient(45deg, #ffffff10 25%, transparent 25%, transparent 75%, #ffffff10 75%, #ffffff10);
      background-size: 40px 40px;
      background-position: 0 0, 20px 20px;
    }
  </style>
</head>
<body class="pattern-bg">

  <div class="glass-card max-w-md w-full p-8 rounded-3xl shadow-2xl border border-white/20">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-blue-900">UPTD FARMASI</h1>
      <h2 class="text-sm font-semibold text-blue-600 uppercase tracking-widest">Kota Tangerang Selatan</h2>
      <div class="w-16 h-1 bg-blue-500 mx-auto mt-4 rounded-full"></div>
      <p class="italic mt-4 text-sm text-gray-600">"Melayani dengan sepenuh hati, ramah, sopan santun, dan cepat."</p>
    </div>

    <div class="space-y-4">
        </div>
  </div>

</body>
</html>
