<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Buku Tamu - UPTD Farmasi Tangsel</title>
</head>
<body class="bg-slate-50 font-sans p-4">

  <div class="max-w-md mx-auto bg-white p-6 rounded-2xl shadow-lg border-t-4 border-blue-900">
    <h1 class="text-2xl font-bold text-blue-900 text-center">UPTD FARMASI</h1>
    <h2 class="text-sm text-center text-gray-600 mb-6 uppercase">Kota Tangerang Selatan</h2>
    <p class="italic text-center text-sm text-gray-500 mb-6">"Kami melayani dengan sepenuh hati, ramah, sopan santun dan cepat."</p>

    <!-- AREA EDUKASI (Real-time dari Firebase) -->
    <div id="edukasiBox" class="bg-blue-50 p-4 rounded-xl border border-blue-200 mb-6">
      <h3 id="judulEdukasi" class="font-bold text-blue-800 mb-1">📚 Memuat Edukasi...</h3>
      <p id="isiEdukasi" class="text-xs text-blue-700"></p>
    </div>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSexxMw_FdW-XT6yTyiPUVnpFyKf_j01-4lk-JmiQRrT3IC04A/viewform" target="_blank"
       class="block w-full bg-green-600 text-white text-center p-3 rounded-lg font-bold mb-6 hover:bg-green-700">
      Isi Survei Kepuasan Dulu
    </a>

    <!-- AREA REGISTRASI -->
    <div class="space-y-4 border-t pt-6">
      <h3 class="font-bold text-gray-700">Registrasi Tamu</h3>
      <input id="nama" placeholder="Nama Lengkap" class="w-full p-3 border rounded-lg">
      <input id="instansi" placeholder="Instansi" class="w-full p-3 border rounded-lg">
      <input id="hp" placeholder="No. Telepon (Contoh: 08123456789)" class="w-full p-3 border rounded-lg">
      
      <select id="keperluan" class="w-full p-3 border rounded-lg">
        <option value="">Pilih Keperluan:</option>
        <option value="OBAT_PKD">A. OBAT PKD</option>
        <option value="VAKSIN">B. VAKSIN</option>
        <option value="REAGEN">C. REAGEN</option>
        <option value="TB_KUSTA">D. TB dan KUSTA</option>
        <option value="HIV_JIWA">E. HIV dan JIWA</option>
        <option value="DBD_MALARIA">F. DBD dan MALARIA</option>
        <option value="KECACINGAN">G. KECACINGAN</option>
        <option value="HEPATITIS">H. HEPATITIS</option>
        <option value="GIZI">I. GIZI</option>
      </select>
      
      <button id="btnSubmit" class="w-full bg-blue-900 text-white p-4 rounded-lg font-bold">
        Check-In & Ambil Antrian
      </button>
    </div>

    <!-- AREA GALERI FOTO (Real-time dari Firebase) -->
    <div class="mt-8 border-t pt-6">
      <h3 class="font-bold text-gray-700 mb-4">Galeri Kegiatan</h3>
      <div id="galeriPublik" class="grid grid-cols-2 gap-3">
        <!-- Foto akan muncul di sini secara otomatis -->
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modalAntrian" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl">
      <h2 class="text-xl font-bold text-gray-800">Check-In Berhasil!</h2>
      <div id="nomorAntrianDisplay" class="text-5xl font-black text-blue-900 my-6">A-000</div>
      <button onclick="tutupModal()" class="w-full bg-blue-900 text-white py-3 rounded-lg font-bold">Tutup & Lanjut ke WA</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, getDocs, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw",
      authDomain: "digital-books-d22c9.firebaseapp.com",
      projectId: "digital-books-d22c9",
      storageBucket: "digital-books-d22c9.firebasestorage.app",
      messagingSenderId: "905407530155",
      appId: "1:905407530155:web:dd90e18d4158ce42fae3ee",
      measurementId: "G-LL7GF2RMF8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    // 1. Ambil Data Edukasi Real-time
    onSnapshot(doc(db, "konten", "edukasi"), (docSnap) => {
      if (docSnap.exists()) {
        const data = docSnap.data();
        document.getElementById("judulEdukasi").innerText = data.judul || "📚 Pojok Edukasi";
        document.getElementById("isiEdukasi").innerText = data.isi || "";
      }
    });

    // 2. Ambil Data Galeri Real-time
    onSnapshot(collection(db, "galeri"), (snapshot) => {
      const galeriContainer = document.getElementById("galeriPublik");
      galeriContainer.innerHTML = "";
      snapshot.forEach((doc) => {
        galeriContainer.innerHTML += `
          <img src="${doc.data().url}" class="w-full h-24 object-cover rounded-lg shadow-sm">
        `;
      });
    });

    // 3. Logika Antrian
    let dataPesanWA = "", nomorAdminWA = "";
    document.getElementById("btnSubmit").addEventListener("click", async () => {
      const nama = document.getElementById("nama").value;
      const instansi = document.getElementById("instansi").value;
      const hp = document.getElementById("hp").value;
      const keperluan = document.getElementById("keperluan").value;
      
      if (!nama || !keperluan) return alert("Mohon isi Nama dan Keperluan!");

      try {
        const querySnapshot = await getDocs(collection(db, "tamu"));
        const kodeAntrian = keperluan.substring(0, 1) + "-" + (querySnapshot.size + 1).toString().padStart(3, '0');

        await addDoc(collection(db, "tamu"), { nama, instansi, hp, keperluan, nomorAntrian: kodeAntrian, waktu: serverTimestamp(), status: "menunggu" });

        dataPesanWA = `Halo Admin, saya ingin Check-In.%0A%0A*No. Antrian:* ${kodeAntrian}%0A*Nama:* ${nama}%0A*Instansi:* ${instansi}%0A*Keperluan:* ${keperluan}`;
        nomorAdminWA = "62881080698977";
        
        document.getElementById("nomorAntrianDisplay").innerText = kodeAntrian;
        document.getElementById("modalAntrian").classList.remove("hidden");
      } catch (e) { alert("Error: " + e.message); }
    });

    window.tutupModal = () => {
      window.open(`https://wa.me/${nomorAdminWA}?text=${dataPesanWA}`, '_blank');
      location.reload(); 
    };
  </script>
</body>
</html>
