<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Dashboard Admin - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 min-h-screen">

  <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-6">Login Admin</h2>
      <input type="password" id="passwordInput" placeholder="Masukkan Password" class="w-full p-3 border rounded-lg mb-4">
      <button onclick="cekPassword()" class="w-full bg-blue-900 text-white p-3 rounded-lg font-bold hover:bg-blue-800">Masuk</button>
    </div>
  </div>

  <div id="dashboardAdmin" class="hidden p-4 max-w-6xl mx-auto space-y-6">
    <div class="bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-blue-900 mb-4">Grafik Tren Tamu (7 Hari Terakhir)</h2>
      <canvas id="grafikPelayanan" height="80"></canvas>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-blue-900 mb-4">Kelola Menu Informasi</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
        <input type="text" id="namaMenu" placeholder="Nama Menu (Contoh: Jadwal)" class="p-2 border rounded-lg text-sm">
        <input type="text" id="deskripsiMenu" placeholder="Deskripsi Singkat" class="p-2 border rounded-lg text-sm">
        <button onclick="tambahMenu()" class="bg-blue-900 text-white p-2 rounded-lg font-bold text-sm">Tambah Menu</button>
      </div>
      
      <h2 class="text-lg font-bold text-blue-900 mb-2">Edit Konten Menu</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <select id="selectMenu" class="p-2 border rounded-lg w-full mb-2"><option value="">Pilih Menu...</option></select>
        <input type="text" id="editUrl" placeholder="Link Gambar" class="p-2 border rounded-lg w-full">
        <textarea id="editIsi" rows="4" placeholder="Isi Konten" class="p-2 border rounded-lg w-full col-span-2"></textarea>
        <button onclick="updateKonten()" class="bg-green-600 text-white p-3 rounded-lg font-bold">Simpan Perubahan</button>
      </div>
      <div id="listMenu" class="mt-4 border-t pt-2 space-y-2"></div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg text-center"><p class="text-sm opacity-80">Total Antrian</p><h2 id="totalTamu" class="text-4xl font-bold">0</h2></div>
      <div class="bg-yellow-500 text-white p-6 rounded-2xl shadow-lg text-center"><p class="text-sm opacity-80">Sedang Diproses</p><h2 id="totalProses" class="text-4xl font-bold">0</h2></div>
      <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg text-center"><p class="text-sm opacity-80">Sudah Selesai</p><h2 id="totalSelesai" class="text-4xl font-bold">0</h2></div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg overflow-x-auto">
      <h2 class="text-xl font-bold text-blue-900 mb-4">Daftar Antrian Real-time</h2>
      <table class="w-full text-left" id="tabelTamuData">
        <thead><tr class="border-b text-gray-500 text-xs uppercase"><th class="p-3">Antrian</th><th class="p-3">Nama</th><th class="p-3">Status</th><th class="p-3">Aksi</th></tr></thead>
        <tbody id="tabelTamu"></tbody>
      </table>
    </div>
    
    <button onclick="logout()" class="w-full bg-red-600 text-white p-3 rounded-lg font-bold">Keluar (Logout)</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", authDomain: "digital-books-d22c9.firebaseapp.com", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app", messagingSenderId: "905407530155", appId: "1:905407530155:web:dd90e18d4158ce42fae3ee", measurementId: "G-LL7GF2RMF8" }));

    window.cekPassword = () => { if (document.getElementById("passwordInput").value === "Badarudin1010") { localStorage.setItem("adminLogedIn", "true"); location.reload(); } else alert("Password Salah!"); };
    window.onload = () => { if (localStorage.getItem("adminLogedIn") === "true") { document.getElementById("loginScreen").classList.add("hidden"); document.getElementById("dashboardAdmin").classList.remove("hidden"); initDashboard(); } };
    window.logout = () => { localStorage.removeItem("adminLogedIn"); location.reload(); };

    function initDashboard() {
        // Load Menu untuk Edit
        onSnapshot(collection(db, "menu_edukasi"), (snap) => {
            const sel = document.getElementById("selectMenu");
            const list = document.getElementById("listMenu");
            sel.innerHTML = '<option value="">Pilih Menu...</option>';
            list.innerHTML = "";
            snap.forEach(d => {
                sel.innerHTML += `<option value="${d.id}">${d.data().judul}</option>`;
                list.innerHTML += `<div class="flex justify-between p-2 border-b text-sm"><span>${d.data().judul}</span><button onclick="hapusMenu('${d.id}')" class="text-red-600 font-bold">Hapus</button></div>`;
            });
        });
    }

    window.tambahMenu = async () => {
        const judul = document.getElementById("namaMenu").value;
        const deskripsi = document.getElementById("deskripsiMenu").value;
        if(!judul) return alert("Isi nama menu!");
        await addDoc(collection(db, "menu_edukasi"), { judul, deskripsi, isi: "", url: "" });
        alert("Menu ditambahkan!");
    };

    window.updateKonten = async () => {
        const id = document.getElementById("selectMenu").value;
        if(!id) return alert("Pilih menu dulu!");
        await updateDoc(doc(db, "menu_edukasi", id), {
            isi: document.getElementById("editIsi").value,
            url: document.getElementById("editUrl").value
        });
        alert("Konten berhasil diperbarui!");
    };

    window.hapusMenu = async (id) => { if(confirm("Hapus menu ini?")) await deleteDoc(doc(db, "menu_edukasi", id)); };
  </script>
</body>
</html>
