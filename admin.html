<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Dashboard Admin - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 min-h-screen">

  <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-6">Login Admin</h2>
      <input type="password" id="passwordInput" placeholder="Masukkan Password" class="w-full p-3 border rounded-lg mb-4">
      <button onclick="cekPassword()" class="w-full bg-blue-900 text-white p-3 rounded-lg font-bold hover:bg-blue-800">Masuk</button>
    </div>
  </div>

  <div id="dashboardAdmin" class="hidden p-4 max-w-6xl mx-auto space-y-6">
    <div class="bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-blue-900 mb-4">Grafik Tren Tamu (7 Hari Terakhir)</h2>
      <canvas id="grafikPelayanan" height="80"></canvas>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Total Antrian</p>
        <h2 id="totalTamu" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-yellow-500 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Sedang Diproses</p>
        <h2 id="totalProses" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Sudah Selesai</p>
        <h2 id="totalSelesai" class="text-4xl font-bold">0</h2>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg overflow-x-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-blue-900">Daftar Antrian Real-time</h2>
        <button onclick="exportTableToCSV('Laporan_Antrian_UPTD.csv')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">Download Excel (.csv)</button>
      </div>
      <table class="w-full text-left" id="tabelTamuData">
        <thead><tr class="border-b text-gray-500 text-xs uppercase"><th class="p-3">Antrian</th><th class="p-3">Nama</th><th class="p-3">Status</th><th class="p-3">Durasi</th><th class="p-3">Aksi</th></tr></thead>
        <tbody id="tabelTamu"></tbody>
      </table>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-blue-900 mb-4">Kelola Galeri Kegiatan</h2>
        <div class="flex gap-2 mb-4">
          <input type="text" id="urlFotoInput" placeholder="Link Foto..." class="flex-1 p-2 border rounded-lg text-sm">
          <button onclick="tambahFoto('galeri', 'urlFotoInput')" class="bg-blue-900 text-white px-4 py-2 rounded-lg text-sm font-bold">Tambah</button>
        </div>
        <div id="listFotoGaleri" class="grid grid-cols-3 gap-2 border-t pt-4"></div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-blue-900 mb-4">Kelola Edukasi (Multi-Foto)</h2>
        <div class="space-y-3 mb-4">
          <input type="text" id="judulEdukasiInput" placeholder="Judul Edukasi" class="w-full p-2 border rounded-lg text-sm">
          <textarea id="isiEdukasiInput" rows="3" placeholder="Isi edukasi..." class="w-full p-2 border rounded-lg text-sm"></textarea>
          <button onclick="simpanTeksEdukasi()" class="w-full bg-blue-600 text-white p-2 rounded-lg font-bold text-sm">Simpan Teks Edukasi</button>
        </div>
        <div class="border-t pt-4">
          <label class="text-xs font-bold text-gray-600">Tambah Foto Edukasi:</label>
          <div class="flex gap-2 mt-1">
            <input type="text" id="urlEdukasiInput" placeholder="Link Foto..." class="flex-1 p-2 border rounded-lg text-sm">
            <button onclick="tambahFoto('edukasi_foto', 'urlEdukasiInput')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold">Tambah</button>
          </div>
          <div id="listFotoEdukasi" class="grid grid-cols-3 gap-2 mt-4"></div>
        </div>
      </div>
    </div>
    <button onclick="logout()" class="w-full bg-red-600 text-white p-3 rounded-lg font-bold hover:bg-red-700 transition">Keluar (Logout)</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp, addDoc, deleteDoc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", authDomain: "digital-books-d22c9.firebaseapp.com", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app", messagingSenderId: "905407530155", appId: "1:905407530155:web:dd90e18d4158ce42fae3ee", measurementId: "G-LL7GF2RMF8" };
    const db = getFirestore(initializeApp(firebaseConfig));
    let chart;

    // --- FUNGSI LOGIN & DASHBOARD ---
    window.onload = () => { if (localStorage.getItem("adminLogedIn") === "true") tampilkanDashboard(); };
    window.cekPassword = () => { if (document.getElementById("passwordInput").value === "Badarudin1010") { localStorage.setItem("adminLogedIn", "true"); tampilkanDashboard(); } else alert("Password Salah!"); };
    window.logout = () => { localStorage.removeItem("adminLogedIn"); location.reload(); };

    function tampilkanDashboard() {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboardAdmin").classList.remove("hidden");
      
      // Load Antrian
      onSnapshot(query(collection(db, "tamu"), orderBy("waktu", "desc")), (snapshot) => {
        let total=0, proses=0, selesai=0; const tabel = document.getElementById("tabelTamu"); tabel.innerHTML = "";
        snapshot.forEach((docSnap) => {
          const data = docSnap.data(); total++;
          if (data.status === "proses") proses++; else if (data.status === "selesai") selesai++;
          tabel.innerHTML += `<tr class="border-b text-sm"><td class="p-3 font-bold">${data.nomorAntrian}</td><td class="p-3">${data.nama}</td><td class="p-3">${data.status}</td><td class="p-3">${data.status === 'proses' ? 'Berjalan...' : '-'}</td><td class="p-3"><button onclick="updateStatus('${docSnap.id}', 'selesai', '${data.hp}', '${data.nama}', '${data.nomorAntrian}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Selesai</button></td></tr>`;
        });
        document.getElementById("totalTamu").innerText = total; document.getElementById("totalProses").innerText = proses; document.getElementById("totalSelesai").innerText = selesai;
      });

      // Load Galeri
      onSnapshot(query(collection(db, "galeri"), orderBy("waktuInput", "desc")), (snap) => {
        const container = document.getElementById("listFotoGaleri"); container.innerHTML = "";
        snap.forEach(d => container.innerHTML += `<div class="relative h-16 border rounded overflow-hidden"><img src="${d.data().url}" class="w-full h-full object-cover"><button onclick="hapusFoto('galeri', '${d.id}')" class="absolute inset-0 bg-red-600/70 text-white text-[10px] opacity-0 hover:opacity-100">Hapus</button></div>`);
      });

      // Load Edukasi Foto
      onSnapshot(query(collection(db, "edukasi_foto"), orderBy("waktuInput", "desc")), (snap) => {
        const container = document.getElementById("listFotoEdukasi"); container.innerHTML = "";
        snap.forEach(d => container.innerHTML += `<div class="relative h-16 border rounded overflow-hidden"><img src="${d.data().url}" class="w-full h-full object-cover"><button onclick="hapusFoto('edukasi_foto', '${d.id}')" class="absolute inset-0 bg-red-600/70 text-white text-[10px] opacity-0 hover:opacity-100">Hapus</button></div>`);
      });

      // Load Teks Edukasi
      onSnapshot(doc(db, "konten", "edukasi"), (docSnap) => {
        if (docSnap.exists()) { const data = docSnap.data(); document.getElementById("judulEdukasiInput").value = data.judul || ""; document.getElementById("isiEdukasiInput").value = data.isi || ""; }
      });
    }

    // --- FUNGSI FOTO (TAMBAH/HAPUS) ---
    window.tambahFoto = async (koleksi, inputId) => {
      const url = document.getElementById(inputId).value.trim();
      if (!url) return alert("Masukkan link foto!");
      await addDoc(collection(db, koleksi), { url, waktuInput: serverTimestamp() });
      document.getElementById(inputId).value = "";
    };
    window.hapusFoto = async (koleksi, id) => { if (confirm("Hapus foto ini?")) await deleteDoc(doc(db, koleksi, id)); };
    window.simpanTeksEdukasi = async () => {
      await setDoc(doc(db, "konten", "edukasi"), { judul: document.getElementById("judulEdukasiInput").value, isi: document.getElementById("isiEdukasiInput").value });
      alert("Teks edukasi disimpan!");
    };
    window.updateStatus = async (id, status, hp, nama, antrian) => { await updateDoc(doc(db, "tamu", id), { status: status }); location.reload(); };
    window.exportTableToCSV = (filename) => { /* FUNGSI CSV ANDA */ };
  </script>
</body>
</html>
