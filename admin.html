<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dashboard Evaluasi - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 p-4">

  <div class="max-w-5xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Total Antrian Hari Ini</p>
        <h2 id="totalTamu" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Sudah Terlayani</p>
        <h2 id="totalSelesai" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-orange-500 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Rata-rata Durasi (Menit)</p>
        <h2 id="avgDurasi" class="text-4xl font-bold">0</h2>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg overflow-x-auto">
      <h2 class="text-xl font-bold mb-4 text-blue-900">Daftar Tamu Real-time</h2>
      <table class="w-full text-left">
        <thead>
          <tr class="border-b text-gray-500 text-sm uppercase">
            <th class="p-3">Antrian</th>
            <th class="p-3">Nama</th>
            <th class="p-3">Status</th>
            <th class="p-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelTamu"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, updateDoc, doc, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* sesuaikan config */ }));

    async function loadData() {
      const q = query(collection(db, "tamu"), orderBy("waktu", "desc"));
      const snapshot = await getDocs(q);
      let total = snapshot.size;
      let selesai = 0;
      let durasiTotal = 0;

      const tabel = document.getElementById("tabelTamu");
      tabel.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        if (data.status === "selesai") selesai++;
        
        tabel.innerHTML += `
          <tr class="border-b">
            <td class="p-3 font-bold">${data.nomorAntrian}</td>
            <td class="p-3">${data.nama}</td>
            <td class="p-3">${data.status === 'selesai' ? '<span class="text-green-600">Selesai</span>' : '<span class="text-yellow-600">Menunggu</span>'}</td>
            <td class="p-3">
              ${data.status !== 'selesai' ? `<button onclick="tandaiSelesai('${docSnap.id}')" class="bg-blue-900 text-white px-3 py-1 rounded">Selesai</button>` : '-'}
            </td>
          </tr>
        `;
      });

      document.getElementById("totalTamu").innerText = total;
      document.getElementById("totalSelesai").innerText = selesai;
    }

    window.tandaiSelesai = async (id) => {
      await updateDoc(doc(db, "tamu", id), {
        status: "selesai",
        waktuSelesai: serverTimestamp()
      });
      loadData();
    };

    loadData();
  </script>
</body>
</html>
