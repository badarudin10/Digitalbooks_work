<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dashboard Admin - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 font-sans p-4">

  <div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-blue-900 mb-6">Dashboard Antrian Tamu</h1>
    
    <div class="bg-white rounded-xl shadow-lg overflow-hidden">
      <table class="w-full text-left border-collapse">
        <thead>
          <tr class="bg-blue-900 text-white">
            <th class="p-3">No. Antrian</th>
            <th class="p-3">Nama</th>
            <th class="p-3">Instansi</th>
            <th class="p-3">Keperluan</th>
          </tr>
        </thead>
        <tbody id="tabelTamu">
          <!-- Data akan muncul di sini secara otomatis -->
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw",
      authDomain: "digital-books-d22c9.firebaseapp.com",
      projectId: "digital-books-d22c9",
      storageBucket: "digital-books-d22c9.firebasestorage.app",
      messagingSenderId: "905407530155",
      appId: "1:905407530155:web:dd90e18d4158ce42fae3ee",
      measurementId: "G-LL7GF2RMF8"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Mengambil data secara real-time
    const q = query(collection(db, "tamu"), orderBy("waktu", "desc"));
    onSnapshot(q, (snapshot) => {
      const tabel = document.getElementById("tabelTamu");
      tabel.innerHTML = "";
      snapshot.forEach((doc) => {
        const data = doc.data();
        tabel.innerHTML += `
          <tr class="border-b">
            <td class="p-3 font-bold text-blue-800">${data.nomorAntrian || '-'}</td>
            <td class="p-3">${data.nama}</td>
            <td class="p-3">${data.instansi}</td>
            <td class="p-3">${data.keperluan}</td>
          </tr>
        `;
      });
    });
  </script>
</body>
</html>
