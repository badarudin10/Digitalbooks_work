<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dashboard Admin - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 min-h-screen">

  <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-6">Login Admin</h2>
      <input type="password" id="passwordInput" placeholder="Masukkan Password" class="w-full p-3 border rounded-lg mb-4">
      <button onclick="cekPassword()" class="w-full bg-blue-900 text-white p-3 rounded-lg font-bold hover:bg-blue-800">Masuk</button>
    </div>
  </div>

  <div id="dashboardAdmin" class="hidden p-4 max-w-6xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Total Antrian</p>
        <h2 id="totalTamu" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-yellow-500 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Sedang Diproses</p>
        <h2 id="totalProses" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Sudah Selesai</p>
        <h2 id="totalSelesai" class="text-4xl font-bold">0</h2>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg overflow-x-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-blue-900">Daftar Antrian Real-time</h2>
        <button onclick="exportTableToCSV('Laporan_Antrian_UPTD.csv')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition">
          Download Excel (.csv)
        </button>
      </div>
      
      <table class="w-full text-left" id="tabelTamuData">
        <thead>
          <tr class="border-b text-gray-500 text-xs uppercase">
            <th class="p-3">Antrian</th>
            <th class="p-3">Nama</th>
            <th class="p-3">Status</th>
            <th class="p-3">Durasi</th>
            <th class="p-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelTamu"></tbody>
      </table>
      
      <button onclick="logout()" class="mt-6 w-full bg-red-600 text-white p-3 rounded-lg font-bold">Keluar (Logout)</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw",
      authDomain: "digital-books-d22c9.firebaseapp.com",
      projectId: "digital-books-d22c9",
      storageBucket: "digital-books-d22c9.firebasestorage.app",
      messagingSenderId: "905407530155",
      appId: "1:905407530155:web:dd90e18d4158ce42fae3ee",
      measurementId: "G-LL7GF2RMF8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    window.onload = () => {
      if (localStorage.getItem("adminLogedIn") === "true") {
        tampilkanDashboard();
      }
    };

    window.cekPassword = () => {
      const pass = document.getElementById("passwordInput").value;
      if (pass === "Badarudin1010") {
        localStorage.setItem("adminLogedIn", "true");
        tampilkanDashboard();
      } else {
        alert("Password Salah!");
      }
    };

    function tampilkanDashboard() {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboardAdmin").classList.remove("hidden");
      
      const q = query(collection(db, "tamu"), orderBy("waktu", "desc"));
      onSnapshot(q, (snapshot) => {
        let total = 0, proses = 0, selesai = 0;
        const tabel = document.getElementById("tabelTamu");
        tabel.innerHTML = "";

        snapshot.forEach((docSnap) => {
          const data = docSnap.data();
          total++;
          if (data.status === "proses") proses++;
          else if (data.status === "selesai") selesai++;

          let durasi = "-";
          if (data.status === 'selesai' && data.waktuSelesai && data.waktuProses) {
            durasi = Math.round((data.waktuSelesai.toDate() - data.waktuProses.toDate()) / 60000) + " Menit";
          } else if (data.status === 'proses') { durasi = "Berjalan..."; }

          tabel.innerHTML += `
            <tr class="border-b text-sm">
              <td class="p-3 font-bold">${data.nomorAntrian}</td>
              <td class="p-3">${data.nama}</td>
              <td class="p-3 font-semibold text-${data.status === 'selesai' ? 'green' : 'yellow'}-600">${data.status || 'menunggu'}</td>
              <td class="p-3">${durasi}</td>
              <td class="p-3 flex gap-2">
                ${data.status !== 'selesai' && data.status !== 'proses' ? `<button onclick="updateStatus('${docSnap.id}', 'proses')" class="bg-yellow-500 text-white px-2 py-1 rounded text-xs">Proses</button>` : ''}
                ${data.status !== 'selesai' ? `<button onclick="updateStatus('${docSnap.id}', 'selesai')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Selesai</button>` : '✓'}
              </td>
            </tr>
          `;
        });
        document.getElementById("totalTamu").innerText = total;
        document.getElementById("totalProses").innerText = proses;
        document.getElementById("totalSelesai").innerText = selesai;
      });
    }

    window.updateStatus = async (id, status) => {
      const updateData = { status: status };
      if (status === 'proses') updateData.waktuProses = serverTimestamp();
      if (status === 'selesai') updateData.waktuSelesai = serverTimestamp();
      await updateDoc(doc(db, "tamu", id), updateData);
    };

    window.logout = () => {
      localStorage.removeItem("adminLogedIn");
      location.reload();
    };

    // Fungsi Export Excel
    window.exportTableToCSV = (filename) => {
      var csv = [];
      var rows = document.querySelectorAll("#tabelTamuData tr");
      for (var i = 0; i < rows.length; i++) {
        var row = [], cols = rows[i].querySelectorAll("td, th");
        for (var j = 0; j < cols.length - 1; j++) { 
          row.push('"' + cols[j].innerText.replace(/"/g, '""') + '"');
        }
        csv.push(row.join(","));
      }
      var csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
      var downloadLink = document.createElement("a");
      downloadLink.download = filename;
      downloadLink.href = window.URL.createObjectURL(csvFile);
      downloadLink.style.display = "none";
      document.body.appendChild(downloadLink);
      downloadLink.click();
    };
  </script>
</body>
</html>
