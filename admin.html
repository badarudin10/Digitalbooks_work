<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dashboard Evaluasi - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 p-4">

  <div class="max-w-5xl mx-auto">
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
      <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Total Antrian</p>
        <h2 id="totalTamu" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Sudah Terlayani</p>
        <h2 id="totalSelesai" class="text-4xl font-bold">0</h2>
      </div>
      <div class="bg-orange-500 text-white p-6 rounded-2xl shadow-lg text-center">
        <p class="text-sm opacity-80">Menunggu</p>
        <h2 id="totalMenunggu" class="text-4xl font-bold">0</h2>
      </div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg overflow-x-auto">
      <h2 class="text-xl font-bold mb-4 text-blue-900">Daftar Antrian Real-time</h2>
      <table class="w-full text-left">
        <thead>
          <tr class="border-b text-gray-500 text-sm uppercase">
            <th class="p-3">Antrian</th>
            <th class="p-3">Nama</th>
            <th class="p-3">Durasi</th>
            <th class="p-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelTamu"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw",
      authDomain: "digital-books-d22c9.firebaseapp.com",
      projectId: "digital-books-d22c9",
      storageBucket: "digital-books-d22c9.firebasestorage.app",
      messagingSenderId: "905407530155",
      appId: "1:905407530155:web:dd90e18d4158ce42fae3ee",
      measurementId: "G-LL7GF2RMF8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));

    // Menggunakan onSnapshot agar real-time
    const q = query(collection(db, "tamu"), orderBy("waktu", "desc"));
    
    onSnapshot(q, (snapshot) => {
      let total = snapshot.size;
      let selesai = 0;
      let menunggu = 0;
      
      const tabel = document.getElementById("tabelTamu");
      tabel.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        if (data.status === "selesai") selesai++; else menunggu++;

        // Hitung Durasi jika sudah selesai
        let durasi = "-";
        if (data.status === "selesai" && data.waktuSelesai && data.waktu) {
          const diff = Math.round((data.waktuSelesai.toDate() - data.waktu.toDate()) / 60000);
          durasi = diff + " menit";
        }

        tabel.innerHTML += `
          <tr class="border-b">
            <td class="p-3 font-bold">${data.nomorAntrian}</td>
            <td class="p-3">${data.nama}</td>
            <td class="p-3 text-sm">${durasi}</td>
            <td class="p-3">
              ${data.status !== 'selesai' ? 
                `<button onclick="tandaiSelesai('${docSnap.id}')" class="bg-blue-900 text-white px-3 py-1 rounded text-sm">Selesai</button>` : 
                '<span class="text-green-600 font-bold">✓ Selesai</span>'}
            </td>
          </tr>
        `;
      });

      document.getElementById("totalTamu").innerText = total;
      document.getElementById("totalSelesai").innerText = selesai;
      document.getElementById("totalMenunggu").innerText = menunggu;
    });

    // Fungsi untuk update status
    window.tandaiSelesai = async (id) => {
      await updateDoc(doc(db, "tamu", id), {
        status: "selesai",
        waktuSelesai: serverTimestamp()
      });
    };
  </script>
</body>
</html>
