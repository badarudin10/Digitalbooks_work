<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <title>Dashboard Admin - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 min-h-screen">

  <div id="loginScreen" class="flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
      <h2 class="text-2xl font-bold text-blue-900 mb-6">Login Admin</h2>
      <input type="password" id="passwordInput" placeholder="Masukkan Password" class="w-full p-3 border rounded-lg mb-4">
      <button onclick="cekPassword()" class="w-full bg-blue-900 text-white p-3 rounded-lg font-bold hover:bg-blue-800">Masuk</button>
    </div>
  </div>

  <div id="dashboardAdmin" class="hidden p-4 max-w-6xl mx-auto space-y-6">
    <div class="bg-white p-6 rounded-2xl shadow-lg">
      <h2 class="text-xl font-bold text-blue-900 mb-4">Grafik Tren Tamu (7 Hari Terakhir)</h2>
      <canvas id="grafikPelayanan" height="80"></canvas>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
      <div class="bg-blue-900 text-white p-6 rounded-2xl shadow-lg text-center"><p class="text-sm opacity-80">Total Antrian</p><h2 id="totalTamu" class="text-4xl font-bold">0</h2></div>
      <div class="bg-yellow-500 text-white p-6 rounded-2xl shadow-lg text-center"><p class="text-sm opacity-80">Sedang Diproses</p><h2 id="totalProses" class="text-4xl font-bold">0</h2></div>
      <div class="bg-green-600 text-white p-6 rounded-2xl shadow-lg text-center"><p class="text-sm opacity-80">Sudah Selesai</p><h2 id="totalSelesai" class="text-4xl font-bold">0</h2></div>
    </div>

    <div class="bg-white p-6 rounded-2xl shadow-lg overflow-x-auto">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold text-blue-900">Daftar Antrian Real-time</h2>
        <button onclick="exportTableToCSV()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-blue-700">Download Excel (.csv)</button>
      </div>
      <table class="w-full text-left" id="tabelTamuData">
        <thead><tr class="border-b text-gray-500 text-xs uppercase"><th class="p-3">Antrian</th><th class="p-3">Nama</th><th class="p-3">Status</th><th class="p-3">Durasi</th><th class="p-3">Aksi</th></tr></thead>
        <tbody id="tabelTamu"></tbody>
      </table>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-blue-900 mb-4">Kelola Galeri Kegiatan</h2>
        <div class="flex gap-2 mb-4"><input type="text" id="urlFotoInput" placeholder="Link Foto..." class="flex-1 p-2 border rounded-lg text-sm"><button onclick="tambahFoto()" class="bg-blue-900 text-white px-4 py-2 rounded-lg text-sm font-bold">Tambah</button></div>
        <div id="listFotoGaleri" class="grid grid-cols-3 gap-2 border-t pt-4"></div>
      </div>

      <div class="bg-white p-6 rounded-2xl shadow-lg">
        <h2 class="text-xl font-bold text-blue-900 mb-4">Kelola Artikel Menu</h2>
        <select id="pilihKategori" class="w-full p-2 border rounded-lg text-sm font-bold bg-gray-50 mb-2">
            <option value="Informasi">Informasi</option><option value="Edukasi">Edukasi</option><option value="Pelayanan">Pelayanan</option><option value="Obat">Kategori Obat</option><option value="Konsultasi">Konsultasi/Keluhan</option>
        </select>
        <input type="text" id="judulArtikelInput" placeholder="Judul..." class="w-full p-2 border rounded-lg text-sm mb-2">
        <input type="text" id="urlKategoriInput" placeholder="Link Foto..." class="w-full p-2 border rounded-lg text-sm mb-2">
        <textarea id="isiKategoriInput" rows="2" placeholder="Isi..." class="w-full p-2 border rounded-lg text-sm mb-2"></textarea>
        <button onclick="tambahArtikel()" class="w-full bg-green-600 text-white p-2 rounded-lg font-bold">Tambah</button>
      </div>
    </div>
    <button onclick="logout()" class="w-full bg-red-600 text-white p-3 rounded-lg font-bold">Keluar (Logout)</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp, addDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app" }));
    let chart;

    window.onload = () => { if (localStorage.getItem("adminLogedIn") === "true") tampilkanDashboard(); };
    window.cekPassword = () => { if (document.getElementById("passwordInput").value === "Badarudin1010") { localStorage.setItem("adminLogedIn", "true"); tampilkanDashboard(); } else alert("Password Salah!"); };
    window.logout = () => { localStorage.removeItem("adminLogedIn"); location.reload(); };

    function tampilkanDashboard() {
      document.getElementById("loginScreen").classList.add("hidden");
      document.getElementById("dashboardAdmin").classList.remove("hidden");
      
      // Load Antrian
      onSnapshot(query(collection(db, "tamu"), orderBy("waktu", "desc")), (snap) => {
        let total=0, p=0, s=0, dataPerHari = {}; const tabel = document.getElementById("tabelTamu"); tabel.innerHTML = "";
        snap.forEach(d => {
          const data = d.data(); total++; if(data.status==='proses') p++; if(data.status==='selesai') s++;
          if(data.waktu) { const tgl = data.waktu.toDate().toLocaleDateString('id-ID'); dataPerHari[tgl] = (dataPerHari[tgl]||0)+1; }
          let durasi = data.status==='selesai' && data.waktuSelesai ? Math.round((data.waktuSelesai.toDate()-data.waktuProses.toDate())/60000)+" Menit" : "-";
          tabel.innerHTML += `<tr class="border-b text-sm"><td>${data.nomorAntrian}</td><td>${data.nama}</td><td>${data.status}</td><td>${durasi}</td><td><button onclick="updateStatus('${d.id}', 'selesai', '${data.hp}', '${data.nama}', '${data.nomorAntrian}')" class="bg-green-600 text-white px-2 py-1 rounded text-xs">Selesai</button></td></tr>`;
        });
        document.getElementById("totalTamu").innerText = total; document.getElementById("totalProses").innerText = p; document.getElementById("totalSelesai").innerText = s;
        if(chart) chart.destroy(); chart = new Chart(document.getElementById('grafikPelayanan'), { type: 'bar', data: { labels: Object.keys(dataPerHari), datasets: [{ data: Object.values(dataPerHari), backgroundColor: '#1e3a8a' }] } });
      });

      // Load Galeri
      onSnapshot(query(collection(db, "galeri"), orderBy("waktuInput", "desc")), (snap) => {
        const c = document.getElementById("listFotoGaleri"); c.innerHTML = "";
        snap.forEach(d => c.innerHTML += `<div class="relative h-16 border rounded overflow-hidden cursor-pointer" onclick="hapusFoto('${d.id}')"><img src="${d.data().url}" class="w-full h-full object-cover"></div>`);
      });
    }

    window.updateStatus = async (id, s, hp, n, a) => {
        await updateDoc(doc(db, "tamu", id), { status: s, waktuSelesai: serverTimestamp() });
        window.open(`https://wa.me/${hp.replace(/^0/, '62')}?text=Halo ${n}, antrian ${a} Anda sudah selesai.`);
    };
    window.tambahFoto = async () => { const u = document.getElementById("urlFotoInput").value; if(u) await addDoc(collection(db, "galeri"), { url: u, waktuInput: serverTimestamp() }); };
    window.hapusFoto = async (id) => { if(confirm("Hapus foto ini?")) await deleteDoc(doc(db, "galeri", id)); };
    window.tambahArtikel = async () => { const k = document.getElementById("pilihKategori").value; await addDoc(collection(db, k), { judul: document.getElementById("judulArtikelInput").value, url: document.getElementById("urlKategoriInput").value, isi: document.getElementById("isiKategoriInput").value, waktuInput: serverTimestamp() }); alert("Berhasil!"); location.reload(); };
    window.exportTableToCSV = () => {
        let csv = []; let rows = document.querySelectorAll("#tabelTamuData tr");
        for (let row of rows) { let cols = row.querySelectorAll("td, th"); let r = []; for (let col of cols) r.push('"' + col.innerText + '"'); csv.push(r.join(",")); }
        let a = document.createElement("a"); a.href = "data:text/csv," + encodeURIComponent(csv.join("\n")); a.download = "Data_Antrian.csv"; a.click();
    };
  </script>
</body>
</html>
