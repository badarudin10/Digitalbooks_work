<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Dashboard Evaluasi - UPTD Farmasi</title>
</head>
<body class="bg-slate-100 p-4">

  <div class="max-w-6xl mx-auto">
    <!-- Ringkasan Statistik -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-blue-900 text-white p-4 rounded-xl shadow text-center">
        <p class="text-xs opacity-80">Total Antrian</p>
        <h2 id="totalTamu" class="text-2xl font-bold">0</h2>
      </div>
      <div class="bg-yellow-500 text-white p-4 rounded-xl shadow text-center">
        <p class="text-xs opacity-80">Dalam Proses</p>
        <h2 id="totalProses" class="text-2xl font-bold">0</h2>
      </div>
      <div class="bg-green-600 text-white p-4 rounded-xl shadow text-center">
        <p class="text-xs opacity-80">Selesai</p>
        <h2 id="totalSelesai" class="text-2xl font-bold">0</h2>
      </div>
    </div>

    <!-- Tabel Daftar Tamu -->
    <div class="bg-white p-6 rounded-2xl shadow-lg overflow-x-auto">
      <table class="w-full text-left">
        <thead>
          <tr class="border-b text-gray-500 text-xs uppercase">
            <th class="p-3">Antrian</th>
            <th class="p-3">Nama</th>
            <th class="p-3">Status</th>
            <th class="p-3">Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelTamu"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, onSnapshot, query, orderBy, updateDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw",
      authDomain: "digital-books-d22c9.firebaseapp.com",
      projectId: "digital-books-d22c9",
      storageBucket: "digital-books-d22c9.firebasestorage.app",
      messagingSenderId: "905407530155",
      appId: "1:905407530155:web:dd90e18d4158ce42fae3ee",
      measurementId: "G-LL7GF2RMF8"
    };

    const db = getFirestore(initializeApp(firebaseConfig));
    const q = query(collection(db, "tamu"), orderBy("waktu", "desc"));
    
    onSnapshot(q, (snapshot) => {
      let total = 0, proses = 0, selesai = 0;
      const tabel = document.getElementById("tabelTamu");
      tabel.innerHTML = "";

      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        total++;
        if (data.status === "proses") proses++;
        else if (data.status === "selesai") selesai++;

        let statusLabel = data.status === 'selesai' ? 'Selesai' : (data.status === 'proses' ? 'Sedang Diproses' : 'Menunggu');
        
        tabel.innerHTML += `
          <tr class="border-b text-sm">
            <td class="p-3 font-bold">${data.nomorAntrian}</td>
            <td class="p-3">${data.nama}</td>
            <td class="p-3 font-semibold ${data.status === 'selesai' ? 'text-green-600' : (data.status === 'proses' ? 'text-yellow-600' : 'text-gray-500')}">${statusLabel}</td>
            <td class="p-3 flex gap-2">
              ${data.status === 'menunggu' ? `<button onclick="updateStatus('${docSnap.id}', 'proses')" class="bg-yellow-500 text-white px-3 py-1 rounded">Proses</button>` : ''}
              ${data.status !== 'selesai' ? `<button onclick="updateStatus('${docSnap.id}', 'selesai')" class="bg-green-600 text-white px-3 py-1 rounded">Selesai</button>` : '✓'}
            </td>
          </tr>
        `;
      });

      document.getElementById("totalTamu").innerText = total;
      document.getElementById("totalProses").innerText = proses;
      document.getElementById("totalSelesai").innerText = selesai;
    });

    window.updateStatus = async (id, status) => {
      await updateDoc(doc(db, "tamu", id), {
        status: status,
        waktuUpdate: serverTimestamp() // Catat waktu saat status berubah
      });
    };
  </script>
</body>
</html>
