<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Artikel UPTD Farmasi</title>
</head>
<body class="font-sans p-4 md:p-8" style="background-image: url("https://i.ibb.co.com/JwnBpzV6/Picsart-26-07-24-02-26-00-368.png"); background-size: cover; background-position: center; background-attachment: fixed;">
  <!-- Halaman 1: Menu Kategori -->
  <div id="pageMenu" class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-blue-900 mb-8 text-center">Pilih Kategori</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <button onclick="bukaDaftar('Informasi')" class="p-6 bg-blue-900 text-white rounded-2xl shadow-lg font-bold text-lg">Informasi</button>
      <button onclick="bukaDaftar('Edukasi')" class="p-6 bg-yellow-500 text-white rounded-2xl shadow-lg font-bold text-lg">Edukasi</button>
      <button onclick="bukaDaftar('Pelayanan')" class="p-6 bg-green-600 text-white rounded-2xl shadow-lg font-bold text-lg">Pelayanan</button>
      <button onclick="bukaDaftar('Obat')" class="p-6 bg-purple-600 text-white rounded-2xl shadow-lg font-bold text-lg">Kategori Obat</button>
      <button onclick="bukaDaftar('Konsultasi')" class="p-6 bg-red-600 text-white rounded-2xl shadow-lg font-bold text-lg">Konsultasi/Keluhan</button>
    </div>
  </div>

  <!-- Halaman 2: Daftar Isi (Daftar Artikel) -->
  <div id="pageDaftar" class="hidden max-w-3xl mx-auto p-6 min-h-screen">
    <button onclick="kembaliKeMenu()" class="text-blue-900 font-bold mb-6">← Kembali ke Menu Utama</button>
    <div id="areaDaftar"></div>
  </div>

  <!-- Halaman 3: Baca Artikel (Full Page) -->
  <div id="pageBaca" class="hidden max-w-3xl mx-auto p-6 bg-white min-h-screen shadow-lg">
    <button onclick="kembaliKeDaftar()" class="text-blue-900 font-bold mb-6 underline">← Kembali ke Daftar Isi</button>
    <div id="areaBaca"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app" }));
    let dataKategoriTerakhir = [];

    window.bukaDaftar = async (kategori) => {
      document.getElementById('pageMenu').classList.add('hidden');
      document.getElementById('pageDaftar').classList.remove('hidden');
      const area = document.getElementById('areaDaftar');
      area.innerHTML = `<p class="font-bold">Memuat ${kategori}...</p>`;
      
      const snap = await getDocs(query(collection(db, kategori), orderBy("waktuInput", "desc")));
      dataKategoriTerakhir = []; // Simpan data untuk referensi kembali
      
      area.innerHTML = `<h2 class="text-3xl font-bold text-blue-900 mb-6">${kategori}</h2>`;
      snap.forEach(d => {
        const data = d.data();
        dataKategoriTerakhir.push(data);
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 border rounded-xl hover:bg-blue-50 font-bold mb-3";
        btn.innerText = "📄 " + data.judul;
        btn.onclick = () => bukaArtikel(data);
        area.appendChild(btn);
      });
    };

    window.bukaArtikel = (data) => {
      document.getElementById('pageDaftar').classList.add('hidden');
      document.getElementById('pageBaca').classList.remove('hidden');
      document.getElementById('areaBaca').innerHTML = `
        <h1 class="text-4xl font-bold text-blue-900 mb-6">${data.judul}</h1>
        <img src="${data.url}" class="w-full h-auto rounded-2xl mb-8">
        <article class="text-xl text-gray-800 leading-relaxed whitespace-pre-line">${data.isi}</article>
      `;
    };

    // Fungsi Navigasi
    window.kembaliKeMenu = () => { document.getElementById('pageDaftar').classList.add('hidden'); document.getElementById('pageMenu').classList.remove('hidden'); };
    window.kembaliKeDaftar = () => { document.getElementById('pageBaca').classList.add('hidden'); document.getElementById('pageDaftar').classList.remove('hidden'); };
  </script>
</body>
</html>
