<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Artikel UPTD Farmasi</title>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Area Navigasi Utama -->
  <div id="viewMenu" class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-blue-900 mb-8 text-center">Pilih Kategori Informasi</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <button onclick="bukaList('Informasi')" class="p-6 bg-blue-900 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-blue-800 transition">Informasi</button>
      <button onclick="bukaList('Edukasi')" class="p-6 bg-yellow-500 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-yellow-400 transition">Edukasi</button>
      <button onclick="bukaList('Pelayanan')" class="p-6 bg-green-600 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-green-500 transition">Pelayanan</button>
      <button onclick="bukaList('Obat')" class="p-6 bg-purple-600 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-purple-500 transition">Kategori Obat</button>
      <button onclick="bukaList('Konsultasi')" class="p-6 bg-red-600 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-red-500 transition">Konsultasi/Keluhan</button>
    </div>
    <div id="listArtikel" class="mt-8 space-y-4"></div>
  </div>

  <!-- Area Baca Artikel (Full Page) -->
  <div id="viewArtikel" class="hidden max-w-3xl mx-auto p-6 bg-white min-h-screen shadow-lg">
    <button onclick="location.reload()" class="text-blue-900 font-bold mb-6 underline">← Kembali ke Menu</button>
    <div id="kontenPenuh"></div>
    <div class="mt-12 pt-6 border-t flex justify-between">
      <button onclick="window.location.href='index.html'" class="text-gray-500 font-bold">🏠 Beranda</button>
      <button onclick="location.reload()" class="text-blue-900 font-bold">Kembali ke Kategori →</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app" }));

    window.bukaList = async (kategori) => {
      const list = document.getElementById('listArtikel');
      list.innerHTML = `<p class="text-center font-bold text-blue-900">Memuat...</p>`;
      const snap = await getDocs(query(collection(db, kategori), orderBy("waktuInput", "desc")));
      list.innerHTML = `<h2 class="text-2xl font-bold text-blue-900 mb-4 border-b pb-2">${kategori}</h2>`;
      snap.forEach(d => {
        const data = d.data();
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 bg-white border rounded-xl shadow-sm hover:bg-blue-50 font-bold";
        btn.innerText = "📄 " + data.judul;
        btn.onclick = () => renderArtikel(data);
        list.appendChild(btn);
      });
    };

    window.renderArtikel = (data) => {
      document.getElementById('viewMenu').classList.add('hidden');
      document.getElementById('viewArtikel').classList.remove('hidden');
      document.getElementById('kontenPenuh').innerHTML = `
        <h1 class="text-4xl font-bold text-blue-900 mb-6">${data.judul}</h1>
        <img src="${data.url}" class="w-full h-auto rounded-2xl mb-8 border shadow-md">
        <article class="text-xl text-gray-800 leading-relaxed whitespace-pre-line">${data.isi}</article>
      `;
    };
  </script>
</body>
</html>
