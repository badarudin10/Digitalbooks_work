<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Artikel UPTD Farmasi</title>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- Halaman Menu (Awal) -->
  <div id="pageMenu" class="max-w-4xl mx-auto p-6">
    <h1 class="text-3xl font-bold text-blue-900 mb-8 text-center">Pilih Kategori</h1>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <button onclick="bukaHalaman('Informasi', 'bg-blue-900')" class="p-6 bg-blue-900 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-blue-800 transition">Informasi</button>
      <button onclick="bukaHalaman('Edukasi', 'bg-yellow-500')" class="p-6 bg-yellow-500 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-yellow-400 transition">Edukasi</button>
      <button onclick="bukaHalaman('Pelayanan', 'bg-green-600')" class="p-6 bg-green-600 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-green-500 transition">Pelayanan</button>
      <button onclick="bukaHalaman('Obat', 'bg-purple-600')" class="p-6 bg-purple-600 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-purple-500 transition">Kategori Obat</button>
      <button onclick="bukaHalaman('Konsultasi', 'bg-red-600')" class="p-6 bg-red-600 text-white rounded-2xl shadow-lg font-bold text-lg hover:bg-red-500 transition">Konsultasi/Keluhan</button>
    </div>
  </div>

  <!-- Halaman Daftar Artikel & Baca Artikel (Disembunyikan) -->
  <div id="pageKonten" class="hidden max-w-3xl mx-auto p-6 bg-white min-h-screen shadow-lg">
    <button onclick="location.reload()" class="text-blue-900 font-bold mb-6 block">← Kembali ke Menu</button>
    <div id="areaRender"></div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app" }));

    window.bukaHalaman = async (kategori, warna) => {
      document.getElementById('pageMenu').classList.add('hidden');
      document.getElementById('pageKonten').classList.remove('hidden');
      const area = document.getElementById('areaRender');
      area.innerHTML = `<p class="font-bold text-blue-900">Memuat ${kategori}...</p>`;
      
      const snap = await getDocs(query(collection(db, kategori), orderBy("waktuInput", "desc")));
      area.innerHTML = `<h2 class="text-3xl font-bold text-blue-900 mb-6 border-b pb-2">${kategori}</h2>`;
      
      snap.forEach(d => {
        const data = d.data();
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 border rounded-xl hover:bg-blue-50 font-bold mb-3";
        btn.innerText = "📄 " + data.judul;
        btn.onclick = () => renderArtikelPenuh(data);
        area.appendChild(btn);
      });
    };

    window.renderArtikelPenuh = (data) => {
      document.getElementById('areaRender').innerHTML = `
        <h1 class="text-4xl font-bold text-blue-900 mb-6">${data.judul}</h1>
        <img src="${data.url}" class="w-full h-auto rounded-2xl mb-8 border shadow-md">
        <article class="text-xl text-gray-800 leading-relaxed whitespace-pre-line">${data.isi}</article>
        <div class="mt-12 pt-6 border-t flex justify-between">
           <button onclick="location.reload()" class="text-blue-900 font-bold">← Kembali ke Daftar</button>
        </div>
      `;
    };
  </script>
</body>
</html>
