<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-modal { transition: opacity 0.3s ease, visibility 0.3s ease; }
    .hidden-custom { opacity: 0; visibility: hidden; pointer-events: none; display: none; }
    .visible-custom { opacity: 1; visibility: visible; pointer-events: auto; display: block; }
  </style>
  <title>Dashboard & Layanan - UPTD Farmasi Tangsel</title>
</head>
<body class="bg-[#f0f4f8] font-sans pb-32 min-h-screen">

  <!-- Header Atas (Logo & Profil Singkat) -->
  <header class="bg-white px-4 py-3 shadow-sm sticky top-0 z-30 flex items-center justify-between border-b">
    <div class="flex items-center gap-2">
      <img src="https://i.ibb.co.com/ksp2gP0q/Lambang-Kota-Tangerang-Selatan-1.png" alt="Logo" class="h-9 w-9 object-contain">
      <span class="font-extrabold text-blue-900 text-sm md:text-base tracking-wide">UPTD FARMASI</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-xs font-bold text-gray-700">KANG UDIN</span>
      <img src="https://i.ibb.co.com/S4NsmKbY/Picsart-26-07-24-02-26-00-368.png" alt="Foto Profil" class="h-9 w-9 rounded-full object-cover border-2 border-blue-900">
    </div>
  </header>

  <!-- KONTEN UTAMA (Tampilan Dashboard MyASN Style) -->
  <main id="mainDashboard" class="max-w-md mx-auto p-4 space-y-4">
    
    <!-- 1. Kartu Profil Pegawai -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative">
      <div class="absolute top-4 right-4 bg-blue-900 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase">
        PPPK
      </div>
      <div class="flex items-center gap-4">
        <div class="h-12 w-12 rounded-full bg-blue-50 flex items-center justify-center text-blue-900 font-bold overflow-hidden border">
          <img src="https://i.ibb.co.com/S4NsmKbY/Picsart-26-07-24-02-26-00-368.png" class="h-full w-full object-cover">
        </div>
        <div>
          <p class="text-xs text-gray-500 font-medium">Selamat Datang,</p>
          <h2 class="text-base font-extrabold text-blue-900">BADARUDIN</h2>
          <p class="text-[11px] text-gray-600 font-mono mt-0.5">NIP: 198910102025211049</p>
        </div>
      </div>
    </div>

    <!-- 2. Kotak Aksi Cepat -->
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex items-center gap-2 mb-3 text-gray-700 font-bold text-xs">
        <span>🔄</span> Aksi Cepat
      </div>
      <div class="grid grid-cols-2 gap-3">
        <!-- Tombol Kategori 1 -->
        <button onclick="bukaDaftar('Informasi')" class="p-4 rounded-xl border border-blue-100 bg-blue-50/40 hover:bg-blue-50 transition text-left flex flex-col justify-between h-24">
          <div class="text-blue-900 text-lg font-bold">📢</div>
          <div>
            <p class="text-xs font-bold text-gray-800">Informasi</p>
            <p class="text-[10px] text-gray-500">Update Arsip & Berita</p>
          </div>
        </button>
        <!-- Tombol Kategori 2 -->
        <button onclick="bukaDaftar('Edukasi')" class="p-4 rounded-xl border border-emerald-100 bg-emerald-50/40 hover:bg-emerald-50 transition text-left flex flex-col justify-between h-24">
          <div class="text-emerald-600 text-lg font-bold">💡</div>
          <div>
            <p class="text-xs font-bold text-gray-800">Edukasi</p>
            <p class="text-[10px] text-gray-500">Materi & Panduan</p>
          </div>
        </button>
        <!-- Tombol Kategori 3 -->
        <button onclick="bukaDaftar('Pelayanan')" class="p-4 rounded-xl border border-purple-100 bg-purple-50/40 hover:bg-purple-50 transition text-left flex flex-col justify-between h-24">
          <div class="text-purple-600 text-lg font-bold">📦</div>
          <div>
            <p class="text-xs font-bold text-gray-800">Layanan ASN</p>
            <p class="text-[10px] text-gray-500">Distribusi & Logistik</p>
          </div>
        </button>
        <!-- Tombol Kategori 4 -->
        <button onclick="bukaDaftar('Obat')" class="p-4 rounded-xl border border-amber-100 bg-amber-50/40 hover:bg-amber-50 transition text-left flex flex-col justify-between h-24">
          <div class="text-amber-600 text-lg font-bold">💊</div>
          <div>
            <p class="text-xs font-bold text-gray-800">Kategori Obat</p>
            <p class="text-[10px] text-gray-500">Data Perbekalan</p>
          </div>
        </button>
      </div>
    </div>

    <!-- 3. Kotak Skor Arsip Digital (DMS) -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-center mb-2">
        <div class="flex items-center gap-2">
          <span class="font-black text-blue-900 tracking-wider">DMS</span>
          <span class="text-[10px] text-gray-400">DOCUMENT MANAGEMENT SYSTEM</span>
        </div>
        <button onclick="location.reload()" class="text-blue-900 text-sm">🔄</button>
      </div>
      <div class="text-center py-2">
        <p class="text-xs text-gray-500">Skor Arsip Digital</p>
        <p class="text-4xl font-black text-emerald-600 my-1">85</p>
        <span class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-2.5 py-0.5 rounded-full">Lengkap</span>
      </div>
    </div>

    <!-- Tombol Kembali ke Buku Tamu Utama -->
    <div class="pt-2">
      <a href="index.html" class="block w-full bg-blue-900 text-white text-center py-3 rounded-xl font-bold text-sm shadow hover:bg-blue-800 transition">
        ← Kembali ke Halaman Buku Tamu Utama
      </a>
    </div>
  </main>

  <!-- KONTEN DINAMIS: Daftar Artikel & Baca Artikel (Tersembunyi Awalnya) -->
  <div id="pageDaftar" class="hidden-custom max-w-md mx-auto p-4">
    <button onclick="kembaliKeDashboard()" class="text-blue-900 font-bold mb-4 text-xs inline-flex items-center gap-1">← Kembali ke Dashboard</button>
    <div id="areaDaftar" class="bg-white p-4 rounded-2xl shadow-sm"></div>
  </div>

  <div id="pageBaca" class="hidden-custom max-w-md mx-auto p-4">
    <button onclick="kembaliKeDaftar()" class="text-blue-900 font-bold mb-4 text-xs inline-flex items-center gap-1">← Kembali ke Daftar</button>
    <div id="areaBaca" class="bg-white p-5 rounded-2xl shadow-sm"></div>
  </div>

  <!-- Bottom Navigation Bar (Menu Bawah ala MyASN di Gambar) -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg py-2 px-4 flex justify-around items-center z-40 max-w-lg mx-auto">
    <a href="#dashboard" onclick="kembaliKeDashboard()" class="flex flex-col items-center text-blue-900">
      <span class="text-xl">🗂️</span>
      <span class="text-[10px] font-bold mt-0.5">Dashboard</span>
    </a>
    <a href="#" onclick="bukaDaftar('Pelayanan')" class="flex flex-col items-center text-gray-400 hover:text-blue-900">
      <span class="text-xl">📂</span>
      <span class="text-[10px] font-medium mt-0.5">Layanan</span>
    </a>
    
    <!-- Tombol Bulat Tengah (Foto Profil) -->
    <div class="relative -top-5">
      <div class="h-14 w-14 rounded-full bg-white border-4 border-blue-900 flex items-center justify-center shadow-md overflow-hidden">
        <img src="https://i.ibb.co.com/S4NsmKbY/Picsart-26-07-24-02-26-00-368.png" class="h-full w-full object-cover">
      </div>
    </div>

    <a href="index.html" class="flex flex-col items-center text-gray-400 hover:text-blue-900">
      <span class="text-xl">✏️</span>
      <span class="text-[10px] font-medium mt-0.5">Buku Tamu</span>
    </a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSexxMw_FdW-XT6yTyiPUVnpFyKf_j01-4lk-JmiQRrT3IC04A/viewform" target="_blank" class="flex flex-col items-center text-gray-400 hover:text-blue-900">
      <span class="text-xl">⚙️</span>
      <span class="text-[10px] font-medium mt-0.5">Lainnya</span>
    </a>
  </nav>

  <!-- Skrip JavaScript & Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const firebaseConfig = { apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", authDomain: "digital-books-d22c9.firebaseapp.com", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app" };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.bukaDaftar = async (kategori) => {
      document.getElementById('mainDashboard').className = 'hidden-custom';
      document.getElementById('pageDaftar').className = 'visible-custom max-w-md mx-auto p-4';
      const area = document.getElementById('areaDaftar');
      area.innerHTML = `<p class="text-xs text-gray-500 text-center py-6">Memuat data ${kategori}...</p>`;
      
      try {
        const snap = await getDocs(query(collection(db, kategori), orderBy("waktuInput", "desc")));
        area.innerHTML = `<h3 class="text-lg font-extrabold text-blue-900 mb-4 capitalize border-b pb-2">Kategori: ${kategori}</h3>`;
        
        if (snap.empty) {
          area.innerHTML += `<p class="text-xs text-gray-400 text-center py-4">Belum ada konten pada kategori ini.</p>`;
          return;
        }

        const listDiv = document.createElement('div');
        listDiv.className = "space-y-2";
        snap.forEach(d => {
          const data = d.data();
          const btn = document.createElement('button');
          btn.className = "w-full text-left p-3 border rounded-xl hover:bg-blue-50 font-bold text-xs text-gray-800 transition shadow-sm flex items-center justify-between";
          btn.innerHTML = `<span>📄 ${data.judul}</span> <span class="text-blue-900 text-[10px]">Baca →</span>`;
          btn.onclick = () => bukaArtikel(data);
          listDiv.appendChild(btn);
        });
        area.appendChild(listDiv);
      } catch (err) {
        area.innerHTML = `<p class="text-xs text-red-500 text-center py-4">Gagal memuat data dari database.</p>`;
      }
    };

    window.bukaArtikel = (data) => {
      document.getElementById('pageDaftar').className = 'hidden-custom';
      document.getElementById('pageBaca').className = 'visible-custom max-w-md mx-auto p-4';
      document.getElementById('areaBaca').innerHTML = `
        <h2 class="text-xl font-extrabold text-blue-900 mb-3">${data.judul}</h2>
        ${data.url ? `<img src="${data.url}" class="w-full h-auto rounded-xl mb-4 shadow-sm object-cover max-h-64">` : ''}
        <article class="text-sm text-gray-700 leading-relaxed whitespace-pre-line bg-gray-50 p-4 rounded-xl border">${data.isi}</article>
      `;
    };

    window.kembaliKeDashboard = () => {
      document.getElementById('pageDaftar').className = 'hidden-custom';
      document.getElementById('pageBaca').className = 'hidden-custom';
      document.getElementById('mainDashboard').className = 'visible-custom max-w-md mx-auto p-4 space-y-4';
    };

    window.kembaliKeDaftar = () => {
      document.getElementById('pageBaca').className = 'hidden-custom';
      document.getElementById('pageDaftar').className = 'visible-custom max-w-md mx-auto p-4';
    };
  </script>
</body>
</html>
