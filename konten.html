<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .fade-in { animation: fadeIn 0.5s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .zoom-img:hover { transform: scale(1.02); transition: 0.3s; }
  </style>
  <title>Artikel Farmasi - UPTD Farmasi</title>
</head>
<body class="bg-slate-50 font-sans p-4 md:p-8">
  <div class="max-w-4xl mx-auto bg-white p-6 md:p-10 rounded-2xl shadow-lg border-t-4 border-blue-900 fade-in">
    <div id="navMenu">
      <h1 class="text-2xl font-bold text-blue-900 mb-6 text-center">Pilih Kategori</h1>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button onclick="pilihKategori('Informasi')" class="p-4 border rounded-xl hover:bg-blue-900 hover:text-white font-bold transition">Informasi</button>
        <button onclick="pilihKategori('Edukasi')" class="p-4 border rounded-xl hover:bg-blue-900 hover:text-white font-bold transition">Edukasi</button>
        <button onclick="pilihKategori('Pelayanan')" class="p-4 border rounded-xl hover:bg-blue-900 hover:text-white font-bold transition">Pelayanan</button>
        <button onclick="pilihKategori('Obat')" class="p-4 border rounded-xl hover:bg-blue-900 hover:text-white font-bold transition">Kategori Obat</button>
        <button onclick="pilihKategori('Konsultasi')" class="p-4 border rounded-xl hover:bg-blue-900 hover:text-white font-bold transition">Konsultasi/Keluhan</button>
      </div>
    </div>

    <div id="areaArtikel" class="hidden">
      <button onclick="location.reload()" class="mb-4 text-blue-900 font-bold">← Kembali ke Kategori</button>
      <div id="listArtikel" class="space-y-6"></div>
    </div>
  </div>

  <div id="modalGambar" class="hidden fixed inset-0 bg-black bg-opacity-90 z-50 flex items-center justify-center p-4">
    <button onclick="document.getElementById('modalGambar').classList.add('hidden')" class="absolute top-5 right-5 text-white text-3xl font-bold">&times;</button>
    <img id="gambarBesar" src="" class="max-w-full max-h-[90vh] rounded-lg">
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", authDomain: "digital-books-d22c9.firebaseapp.com", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app", messagingSenderId: "905407530155", appId: "1:905407530155:web:dd90e18d4158ce42fae3ee", measurementId: "G-LL7GF2RMF8" }));

    window.pilihKategori = async (kategori) => {
      document.getElementById("navMenu").classList.add("hidden");
      document.getElementById("areaArtikel").classList.remove("hidden");
      const snap = await getDocs(query(collection(db, kategori), orderBy("waktuInput", "desc")));
      const list = document.getElementById("listArtikel");
      list.innerHTML = `<h2 class="text-xl font-bold text-blue-900 mb-4">${kategori}</h2>`;
      snap.forEach(d => {
        const data = d.data();
        list.innerHTML += `
          <div class="border-b pb-4 fade-in">
            <h3 class="text-lg font-bold text-blue-800">${data.judul}</h3>
            <img src="${data.url}" onclick="zoom('${data.url}')" class="zoom-img w-full h-48 object-cover rounded-lg my-2 cursor-pointer">
            <p class="text-gray-700 whitespace-pre-line">${data.isi}</p>
          </div>`;
      });
    };
    window.zoom = (url) => { document.getElementById("gambarBesar").src = url; document.getElementById("modalGambar").classList.remove("hidden"); };
  </script>
</body>
</html>
