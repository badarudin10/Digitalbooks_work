<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .hidden-custom { opacity: 0; visibility: hidden; pointer-events: none; display: none; }
    .visible-custom { opacity: 1; visibility: visible; pointer-events: auto; display: block; }
  </style>
  <title>Dashboard & Layanan - UPTD Farmasi Tangsel</title>
</head>
<body class="bg-[#f0f4f8] font-sans pb-32 min-h-screen">

  <!-- Header Atas -->
  <header class="bg-white px-4 py-3 shadow-sm sticky top-0 z-30 flex items-center justify-between border-b">
    <div class="flex items-center gap-3">
      <img src="https://i.ibb.co.com/ksp2gP0q/Lambang-Kota-Tangerang-Selatan-1.png" alt="Logo" class="h-10 w-10 object-contain">
      <div>
        <h1 class="font-extrabold text-blue-900 text-sm tracking-wide leading-tight">UPTD FARMASI</h1>
        <p class="text-[10px] text-gray-600 font-semibold uppercase tracking-wider">Kota Tangerang Selatan</p>
      </div>
    </div>
    <!-- Foto Profil Kecil di Kanan Header -->
    <a href="profil.html" class="h-9 w-9 rounded-full overflow-hidden border-2 border-blue-900 shadow-sm block">
      <img src="https://i.ibb.co.com/jPB3ZPgJ/Picsart-26-07-24-23-07-31-642.png" class="h-full w-full object-cover">
    </a>
  </header>

  <!-- KONTEN UTAMA -->
  <main id="mainDashboard" class="max-w-md mx-auto p-4 space-y-4">
    
    <!-- 1. Kartu Profil Pegawai (Tanpa Label PPPK) -->
    <a href="profil.html" class="block bg-white p-5 rounded-2xl shadow-sm border border-gray-100 relative hover:border-blue-300 transition">
      <div class="flex items-center gap-4">
        <div class="h-14 w-14 rounded-full flex items-center justify-center overflow-hidden border-2 border-blue-900 shadow-sm flex-shrink-0 bg-transparent">
          <img src="https://i.ibb.co.com/jPB3ZPgJ/Picsart-26-07-24-23-07-31-642.png" class="h-full w-full object-cover">
        </div>
        <div>
          <p class="text-xs text-blue-900 font-extrabold uppercase tracking-wide">PROFIL PEGAWAI UPTD FARMASI</p>
          <h2 class="text-base font-extrabold text-gray-800 mt-0.5">BADARUDIN</h2>
          <p class="text-[11px] text-gray-600 font-mono mt-0.5">NIP: 198910102025211049</p>
        </div>
      </div>
    </a>

    <!-- 2. Kotak Aksi Cepat (Ikon Diperbesar, Transparan, & Proporsional) -->
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex items-center gap-2 mb-3 text-gray-700 font-bold text-xs">
        <span class="text-blue-900">⇄</span> Aksi Cepat
      </div>
      <div class="grid grid-cols-2 gap-3">
        
        <!-- Informasi -->
        <button onclick="bukaDaftar('Informasi')" class="p-4 rounded-xl border border-blue-100 bg-[#f4f8fb] hover:bg-blue-50 transition text-left flex flex-col justify-between h-36">
          <div class="w-12 h-12 flex items-center justify-center bg-transparent">
            <img src="https://i.ibb.co.com/fzWd1Sq6/Picsart-26-07-24-23-03-05-634.png" class="w-12 h-12 object-contain">
          </div>
          <div>
            <p class="text-xs font-bold text-gray-800">Informasi</p>
            <p class="text-[10px] text-gray-500">Update Arsip & Berita</p>
          </div>
        </button>

        <!-- Edukasi -->
        <button onclick="bukaDaftar('Edukasi')" class="p-4 rounded-xl border border-emerald-100 bg-[#f2faf5] hover:bg-emerald-50 transition text-left flex flex-col justify-between h-36">
          <div class="w-12 h-12 flex items-center justify-center bg-transparent">
            <img src="https://i.ibb.co.com/SWQXc7m/Picsart-26-07-24-23-05-58-799.png" class="w-12 h-12 object-contain">
          </div>
          <div>
            <p class="text-xs font-bold text-gray-800">Edukasi</p>
            <p class="text-[10px] text-gray-500">Materi & Panduan</p>
          </div>
        </button>

        <!-- Layanan ASN -->
        <button onclick="bukaDaftar('Pelayanan')" class="p-4 rounded-xl border border-purple-100 bg-[#faf5fb] hover:bg-purple-50 transition text-left flex flex-col justify-between h-36">
          <div class="w-12 h-12 flex items-center justify-center bg-transparent">
            <img src="https://i.ibb.co.com/N6WBWsJT/Picsart-26-07-24-23-01-12-888.png" class="w-12 h-12 object-contain">
          </div>
          <div>
            <p class="text-xs font-bold text-gray-800">Layanan ASN</p>
            <p class="text-[10px] text-gray-500">Distribusi & Logistik</p>
          </div>
        </button>

        <!-- Kategori Obat -->
        <button onclick="bukaDaftar('Obat')" class="p-4 rounded-xl border border-amber-100 bg-[#fdfaf2] hover:bg-amber-50 transition text-left flex flex-col justify-between h-36">
          <div class="w-12 h-12 flex items-center justify-center bg-transparent">
            <img src="https://i.ibb.co.com/8QzyGR8/Picsart-26-07-24-23-04-30-680.png" class="w-12 h-12 object-contain">
          </div>
          <div>
            <p class="text-xs font-bold text-gray-800">Kategori Obat</p>
            <p class="text-[10px] text-gray-500">Data Perbekalan</p>
          </div>
        </button>

      </div>
    </div>

    <!-- 3. Kotak Skor Arsip Digital (DMS) -->
    <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
      <div class="flex justify-between items-center mb-2">
        <div class="flex items-center gap-2">
          <span class="font-black text-blue-900 tracking-wider text-sm">DMS</span>
          <span class="text-[9px] text-gray-400 font-semibold">DOCUMENT MANAGEMENT SYSTEM</span>
        </div>
        <button onclick="location.reload()" class="text-blue-900 text-sm">🔄</button>
      </div>
      <div class="text-center py-2">
        <p class="text-xs text-gray-500">Skor Arsip Digital</p>
        <p class="text-4xl font-black text-emerald-600 my-1">85</p>
        <span class="bg-emerald-100 text-emerald-700 text-[10px] font-bold px-3 py-0.5 rounded-full">Lengkap</span>
      </div>
    </div>
  </main>

  <!-- KONTEN DINAMIS -->
  <div id="pageDaftar" class="hidden-custom max-w-md mx-auto p-4">
    <button onclick="kembaliKeDashboard()" class="text-blue-900 font-bold mb-4 text-xs inline-flex items-center gap-1">← Kembali ke Dashboard</button>
    <div id="areaDaftar" class="bg-white p-4 rounded-2xl shadow-sm"></div>
  </div>

  <div id="pageBaca" class="hidden-custom max-w-md mx-auto p-4">
    <button onclick="kembaliKeDaftar()" class="text-blue-900 font-bold mb-4 text-xs inline-flex items-center gap-1">← Kembali ke Daftar</button>
    <div id="areaBaca" class="bg-white p-5 rounded-2xl shadow-sm"></div>
  </div>

  <!-- Bottom Navigation Bar (Mengembalikan Ikon Asli Anda dengan Ukuran Proporsional & Transparan) -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-lg py-2 px-4 flex justify-around items-center z-40 max-w-lg mx-auto">
    
    <!-- Dashboard -->
    <a href="#dashboard" onclick="kembaliKeDashboard()" class="flex flex-col items-center text-blue-900">
      <img src="https://i.ibb.co.com/9mj7jgbg/Picsart-26-07-24-23-34-54-674.png" class="w-7 h-7 object-contain bg-transparent">
      <span class="text-[10px] font-bold mt-1">Dashboard</span>
    </a>

    <!-- Layanan -->
    <a href="#" onclick="bukaDaftar('Pelayanan')" class="flex flex-col items-center text-gray-500 hover:text-blue-900">
      <img src="https://i.ibb.co.com/N6WBWsJT/Picsart-26-07-24-23-01-12-888.png" class="w-7 h-7 object-contain bg-transparent">
      <span class="text-[10px] font-medium mt-1">Layanan</span>
    </a>
    
    <!-- Tombol Bulat Tengah (Profil) -->
    <div class="relative -top-5">
      <a href="profil.html" class="block h-14 w-14 rounded-full bg-white border-4 border-blue-900 flex items-center justify-center shadow-md overflow-hidden hover:scale-105 transition">
        <img src="https://i.ibb.co.com/jPB3ZPgJ/Picsart-26-07-24-23-07-31-642.png" class="h-full w-full object-cover">
      </a>
    </div>

    <!-- Buku Tamu -->
    <a href="index.html" class="flex flex-col items-center text-gray-500 hover:text-blue-900">
      <img src="https://i.ibb.co.com/YBSNWNGM/Picsart-26-07-24-23-37-45-946.png" class="w-7 h-7 object-contain bg-transparent">
      <span class="text-[10px] font-medium mt-1">Buku Tamu</span>
    </a>

    <!-- Lainnya -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSexxMw_FdW-XT6yTyiPUVnpFyKf_j01-4lk-JmiQRrT3IC04A/viewform" target="_blank" class="flex flex-col items-center text-gray-500 hover:text-blue-900">
      <img src="https://i.ibb.co.com/SXPG746X/Picsart-26-07-24-23-36-23-677.png" class="w-7 h-7 object-contain bg-transparent">
      <span class="text-[10px] font-medium mt-1">Lainnya</span>
    </a>
  </nav>

  <!-- Skrip JavaScript & Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const firebaseConfig = { apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", authDomain: "digital-books-d22c9.firebaseapp.com", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app" };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.bukaDaftar = async (kategori) => {
      document.getElementById('mainDashboard').className = 'hidden-custom';
      document.getElementById('pageDaftar').className = 'visible-custom max-w-md mx-auto p-4';
      const area = document.getElementById('areaDaftar');
      area.innerHTML = `<p class="text-xs text-gray-500 text-center py-6">Memuat data ${kategori}...</p>`;
      
      try {
        const snap = await getDocs(query(collection(db, kategori), orderBy("waktuInput", "desc")));
        area.innerHTML = `<h3 class="text-lg font-extrabold text-blue-900 mb-4 capitalize border-b pb-2">Kategori: ${kategori}</h3>`;
        
        if (snap.empty) {
          area.innerHTML += `<p class="text-xs text-gray-400 text-center py-4">Belum ada konten pada kategori ini.</p>`;
          return;
        }

        const listDiv = document.createElement('div');
        listDiv.className = "space-y-2";
        snap.forEach(d => {
          const data = d.data();
          const btn = document.createElement('button');
          btn.className = "w-full text-left p-3 border rounded-xl hover:bg-blue-50 font-bold text-xs text-gray-800 transition shadow-sm flex items-center justify-between";
          btn.innerHTML = `<span>📄 ${data.judul}</span> <span class="text-blue-900 text-[10px]">Baca →</span>`;
          btn.onclick = () => bukaArtikel(data);
          listDiv.appendChild(btn);
        });
        area.appendChild(listDiv);
      } catch (err) {
        area.innerHTML = `<p class="text-xs text-red-500 text-center py-4">Gagal memuat data dari database.</p>`;
      }
    };

    window.bukaArtikel = (data) => {
      document.getElementById('pageDaftar').className = 'hidden-custom';
      document.getElementById('pageBaca').className = 'visible-custom max-w-md mx-auto p-4';
      document.getElementById('areaBaca').innerHTML = `
        <h2 class="text-xl font-extrabold text-blue-900 mb-3">${data.judul}</h2>
        ${data.url ? `<img src="${data.url}" class="w-full h-auto rounded-xl mb-4 shadow-sm object-cover max-h-64">` : ''}
        <article class="text-sm text-gray-700 leading-relaxed whitespace-pre-line bg-gray-50 p-4 rounded-xl border">${data.isi}</article>
      `;
    };

    window.kembaliKeDashboard = () => {
      document.getElementById('pageDaftar').className = 'hidden-custom';
      document.getElementById('pageBaca').className = 'hidden-custom';
      document.getElementById('mainDashboard').className = 'visible-custom max-w-md mx-auto p-4 space-y-4';
    };

    window.kembaliKeDaftar = () => {
      document.getElementById('pageBaca').className = 'hidden-custom';
      document.getElementById('pageDaftar').className = 'visible-custom max-w-md mx-auto p-4';
    };
  </script>
</body>
</html>
