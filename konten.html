<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Informasi Farmasi</title>
</head>
<body class="bg-gray-50 p-4 md:p-8">
  <div id="mainContent" class="max-w-3xl mx-auto bg-white p-6 md:p-10 rounded-2xl shadow-xl min-h-screen">
    
    <div id="viewMenu">
      <h1 class="text-2xl font-bold text-blue-900 mb-6 text-center">Pilih Kategori</h1>
      <div id="gridKategori" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <button onclick="bukaList('Informasi')" class="p-4 bg-blue-50 rounded-xl font-bold text-blue-900">Informasi</button>
        <button onclick="bukaList('Edukasi')" class="p-4 bg-blue-50 rounded-xl font-bold text-blue-900">Edukasi</button>
        <button onclick="bukaList('Pelayanan')" class="p-4 bg-blue-50 rounded-xl font-bold text-blue-900">Pelayanan</button>
        <button onclick="bukaList('Obat')" class="p-4 bg-blue-50 rounded-xl font-bold text-blue-900">Kategori Obat</button>
        <button onclick="bukaList('Konsultasi')" class="p-4 bg-blue-50 rounded-xl font-bold text-blue-900">Konsultasi/Keluhan</button>
      </div>
      <div id="listArtikel" class="mt-6 space-y-3"></div>
    </div>

    <div id="viewArtikel" class="hidden">
      <div id="isiArtikel"></div>
      <div class="mt-10 pt-6 border-t flex justify-between">
        <button onclick="window.location.href='index.html'" class="text-blue-900 font-bold">🏠 Beranda</button>
        <button onclick="location.reload()" class="text-blue-900 font-bold">← Kembali ke Kategori</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
    
    const db = getFirestore(initializeApp({ apiKey: "AIzaSyA6B5MysWIMi4weR3Wgo3HuaIl-aaZpChw", projectId: "digital-books-d22c9", storageBucket: "digital-books-d22c9.firebasestorage.app" }));

    window.bukaList = async (kategori) => {
      document.getElementById('gridKategori').classList.add('hidden');
      const list = document.getElementById('listArtikel');
      const snap = await getDocs(query(collection(db, kategori), orderBy("waktuInput", "desc")));
      list.innerHTML = `<h2 class="text-xl font-bold text-blue-900 mb-4">${kategori}</h2>`;
      snap.forEach(d => {
        const data = d.data();
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-4 border rounded-xl hover:bg-gray-100 font-bold";
        btn.innerText = "📄 " + data.judul;
        btn.onclick = () => renderArtikel(data);
        list.appendChild(btn);
      });
    };

    window.renderArtikel = (data) => {
      document.getElementById('viewMenu').classList.add('hidden');
      document.getElementById('viewArtikel').classList.remove('hidden');
      document.getElementById('isiArtikel').innerHTML = `
        <h1 class="text-3xl font-bold text-blue-900 mb-4">${data.judul}</h1>
        <img src="${data.url}" class="w-full h-auto rounded-xl shadow-lg mb-6 object-contain">
        <article class="text-lg text-gray-800 leading-relaxed">${data.isi.replace(/\n/g, '<br>')}</article>
      `;
    };
  </script>
</body>
</html>
